name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint, Build, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Selene
        run: selene src

      - name: StyLua
        run: stylua --check src

      - name: Rojo build (smoke / parse check)
        run: |
          mkdir -p build
          rojo build default.project.json -o build/ReefTycoon.rbxlx

      - name: Unit tests (Lune)
        run: lune run tests/run.luau
