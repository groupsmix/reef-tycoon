name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Selene
        run: selene src

      - name: StyLua
        run: stylua --check src

      - name: Rojo build (sanity)
        run: rojo build default.project.json -o build/ReefTycoon.rbxlx
