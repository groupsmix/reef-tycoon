name: Headless Test

# Boots the place under run-in-roblox and asserts that bootstrap (and the
# vendored TestEZ-style suite under `tests/`) finish without errors.
#
# run-in-roblox requires Roblox Studio installed on the runner. The default
# `ubuntu-latest` runner does not ship Studio, so this workflow is wired up
# behind `workflow_dispatch` only and expects to be pointed at a self-hosted
# runner (Windows / macOS) where Studio is installed.
#
# The runner needs:
#   - Roblox Studio installed and signed in once
#   - Rokit available on PATH (or installed by the workflow)

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: Smoke (Main.server.luau boots)
    runs-on: ${{ vars.STUDIO_RUNNER || 'ubuntu-latest' }}
    if: ${{ vars.STUDIO_RUNNER != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Build place
        run: |
          mkdir -p build
          rojo build default.project.json -o build/ReefTycoon.rbxlx

      - name: Boot under run-in-roblox
        shell: bash
        run: |
          # Tiny script that lets the bootstrap run for a few seconds and
          # then exits 0 if no errors hit ScriptContext.Error.
          cat > build/smoke.luau <<'EOF'
          local ScriptContext = game:GetService("ScriptContext")
          local errors = {}
          ScriptContext.Error:Connect(function(msg, trace, _script)
              table.insert(errors, msg .. "\n" .. trace)
          end)
          task.wait(8)
          if #errors > 0 then
              for _, e in errors do
                  warn(e)
              end
              error(("smoke: %d ScriptContext.Error events"):format(#errors))
          end
          print("smoke: ok")
          EOF
          run-in-roblox --place build/ReefTycoon.rbxlx --script build/smoke.luau

  unit:
    name: Unit (TestEZ specs)
    runs-on: ${{ vars.STUDIO_RUNNER || 'ubuntu-latest' }}
    if: ${{ vars.STUDIO_RUNNER != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Build test place
        run: |
          mkdir -p build
          rojo build tests.project.json -o build/ReefTycoonTests.rbxlx

      - name: Run tests under run-in-roblox
        run: run-in-roblox --place build/ReefTycoonTests.rbxlx --script tests/TestRunner.server.luau
